name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root)
        run: npm ci

      - name: Build Vite application
        run: npm run build

      - name: Run tests
        run: npm test --if-present

      - name: Install dependencies (panel)
        run: npm ci
        working-directory: panel

      - name: Build Next.js panel
        run: npm run build
        working-directory: panel
        env:
          API_BASE_URL: http://localhost:8787
