name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root)
        run: npm ci

      - name: Build Vite application
        run: npm run build

      - name: Run tests
        run: npm test --if-present

  ensure-release-branch:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release branch exists
        shell: bash
        run: |
          git fetch origin release || true
          if git ls-remote --exit-code --heads origin release >/dev/null 2>&1; then
            echo "La branche release existe déjà."
          else
            echo "Création de la branche release depuis ${GITHUB_REF_NAME}."
            git checkout -b release
            git push origin release
          fi
