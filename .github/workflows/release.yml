name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      should_release: ${{ steps.meta.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          LATEST_VERSION_FROM_CHANGELOG="$(grep -m1 '^## ' CHANGELOG.md | sed -E 's/^##[[:space:]]+([^[:space:]]+).*/\1/' | sed -E 's/^[vV]?/v/')"

          if [ -z "$LATEST_VERSION_FROM_CHANGELOG" ]; then
            echo "Impossible d'extraire la dernière version du changelog."
            exit 1
          fi

          if [ "$LATEST_VERSION_FROM_CHANGELOG" != "$TAG" ]; then
            echo "La dernière version du changelog ($LATEST_VERSION_FROM_CHANGELOG) ne correspond pas à package.json ($TAG)."
            exit 1
          fi

          SHOULD_RELEASE="true"
          if gh release view "$TAG" >/dev/null 2>&1; then
            SHOULD_RELEASE="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract latest release notes from CHANGELOG.md
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          node scripts/extract-release-notes.cjs --input CHANGELOG.md --output RELEASE_NOTES.md --latest

      - name: Upload release notes artifact
        if: steps.meta.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-windows-artifacts:
    runs-on: windows-latest
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Desktop and Player packages
        run: |
          npm run package:admin:win
          npm run package:player:win

      - name: Prepare renamed executables for release
        shell: pwsh
        run: |
          $Version = '${{ needs.prepare.outputs.version }}'
          New-Item -ItemType Directory -Path release-upload -Force | Out-Null

          Copy-Item "release/admin/Digital-Kiosk-Desktop-Setup-$Version.exe" "release-upload/Digital-Kiosk-Desktop-Setup-v$Version.exe" -Force
          Copy-Item "release/admin/Digital-Kiosk-Desktop-Portable-$Version.exe" "release-upload/Digital-Kiosk-Desktop-Portable-v$Version.exe" -Force
          Copy-Item "release/player/Digital-Kiosk-Player-Setup-$Version.exe" "release-upload/Digital-Kiosk-Player-Setup-v$Version.exe" -Force
          Copy-Item "release/player/Digital-Kiosk-Player-Portable-$Version.exe" "release-upload/Digital-Kiosk-Player-Portable-v$Version.exe" -Force

      - name: Upload Windows executables artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: release-upload/*.exe

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-windows-artifacts
    if: needs.prepare.outputs.should_release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release notes artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Download Windows executables artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executables
          path: release-upload

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Digital Kiosk ${{ needs.prepare.outputs.tag }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            release-upload/*.exe
